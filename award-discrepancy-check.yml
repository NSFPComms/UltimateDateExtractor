name: Award Date Discrepancy Check

on:
  schedule:
    - cron: '0 13 * * 6'   # Saturday 8am ET (13:00 UTC during EDT) — adjust if needed
  workflow_dispatch:        # manual trigger for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install cheerio pdf-parse node-fetch@2

      - name: Run scraper
        run: node scrape.js

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/discrepancies.json output/email-body.html
          git diff --staged --quiet || git commit -m "Update award discrepancy report [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
